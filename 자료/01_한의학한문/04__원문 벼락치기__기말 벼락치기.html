<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>한의학한문 원문 2.0 벼락치기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Nanum+Gothic:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f6;
  --card:#fff;
  --t:#1a1a1a;
  --t2:#525252;
  --t3:#a3a3a3;
  --bd:#e5e5e5;
  --s:#f5f4f0;
  --s2:#ebe9e3;
  --accent:#8b1a1a;
  --blue:#1e4d7b;
  --blue-light:#e8f0f7;
  --good:#15803d;
  --good-light:#dcfce7;
  --bad:#b91c1c;
  --bad-light:#fee2e2;
}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);color:var(--t);line-height:1.6;padding:16px;padding-bottom:100px}
.wrap{max-width:800px;margin:0 auto}

.hero{text-align:center;padding:20px 0 16px;border-bottom:2px solid var(--t);margin-bottom:18px}
.hero h1{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:900;letter-spacing:3px;margin-bottom:4px}
.hero .sub{font-size:11px;color:var(--t3);letter-spacing:3px}

/* 원문 선택 탭 */
.cat-tabs{display:flex;gap:4px;padding:4px;background:var(--s);border-radius:100px;margin-bottom:14px;overflow-x:auto;flex-wrap:nowrap}
.cat-tab{flex-shrink:0;padding:8px 14px;background:transparent;border:none;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--t2);white-space:nowrap;transition:.2s}
.cat-tab:hover{background:#e7e5e4}
.cat-tab.on{background:var(--t);color:#fff}
.cat-tab .hj{font-family:'Noto Serif KR',serif;margin-right:3px}
.cat-tab .cnt{font-size:10px;opacity:.6;margin-left:3px}

/* 모드 토글 */
.mode-bar{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.mode-btn{padding:8px 16px;background:var(--card);border:1.5px solid var(--bd);border-radius:100px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--t2);transition:.15s}
.mode-btn:hover{background:var(--s)}
.mode-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* 컨트롤 */
.ctrl-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;justify-content:center}
.btn{padding:8px 14px;background:var(--card);border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--t2);transition:.15s}
.btn:hover{background:var(--s)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#6e1414}
.progress{padding:8px 14px;background:var(--blue-light);color:var(--blue);border-radius:8px;font-size:12px;font-weight:700;min-width:90px;text-align:center}
.progress .done{color:var(--accent);margin-left:4px;font-size:10px}

/* ====== 플래시카드 모드 ====== */
.flash-wrap{margin:16px 0}
.flash{perspective:1400px;min-height:320px;cursor:pointer;user-select:none}
.flash-inner{position:relative;width:100%;min-height:320px;transition:transform .6s cubic-bezier(0.4, 0.0, 0.2, 1);transform-style:preserve-3d}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;width:100%;height:100%;min-height:320px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;padding:24px 28px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1.5px solid var(--bd);display:flex;flex-direction:column;justify-content:center;align-items:center}
.flash-face.front{background:linear-gradient(135deg,#fff,#faf9f6)}
.flash-face.back{background:linear-gradient(135deg,#fef2f2,#fff);transform:rotateY(180deg);border-color:#fca5a5}

.front-hj{font-family:'Noto Serif KR',serif;font-weight:800;color:var(--t);text-align:center;letter-spacing:3px;line-height:2}
.front-meta{font-size:10px;color:var(--t3);letter-spacing:2px;margin-top:20px;font-weight:700}
.front-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--t3);letter-spacing:1px}
.front-hj.sz-xs{font-size:13pt}
.front-hj.sz-s{font-size:16pt}
.front-hj.sz-m{font-size:20pt}
.front-hj.sz-l{font-size:26pt}
.front-hj.sz-xl{font-size:32pt}

.back-label{font-size:10px;color:var(--accent);font-weight:800;letter-spacing:3px;margin-bottom:4px}
.back-orig{font-family:'Noto Serif KR',serif;font-size:14pt;font-weight:700;color:var(--t);line-height:1.8;margin-bottom:12px;text-align:center;letter-spacing:2px;padding-bottom:10px;border-bottom:1px dashed #fca5a5;width:100%;word-break:keep-all}
.back-eum{font-size:13pt;color:var(--accent);font-weight:700;letter-spacing:2px;line-height:1.8;text-align:center;margin-bottom:14px;word-break:keep-all}
.back-trans{font-size:11pt;color:var(--t);line-height:1.8;text-align:center;word-break:keep-all;padding:10px 12px;background:var(--blue-light);border-radius:8px;width:100%}
.back-trans-label{display:inline-block;font-size:9px;color:var(--blue);font-weight:800;letter-spacing:2px;margin-bottom:4px}

/* ====== 음 쓰기 연습 모드 ====== */
.write-card{background:var(--card);border:1.5px solid var(--bd);border-radius:16px;padding:22px 20px;box-shadow:0 4px 20px rgba(0,0,0,.04);margin:16px 0}
.write-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:1px dashed var(--bd)}
.write-head .num{font-size:11px;color:var(--accent);letter-spacing:2px;font-weight:800}
.write-head .score{padding:5px 12px;background:var(--blue-light);color:var(--blue);border-radius:100px;font-size:11px;font-weight:700}
.write-head .score.good{background:var(--good-light);color:var(--good)}
.write-head .score.perfect{background:var(--good);color:#fff}

.write-body{display:flex;flex-wrap:wrap;gap:4px 0;justify-content:center;align-items:flex-start;padding:10px 0}
.ch-unit{display:inline-flex;flex-direction:column;align-items:center;padding:4px 3px;min-width:36px}
.ch-unit .ch-hj{font-family:'Noto Serif KR',serif;font-size:22pt;font-weight:800;color:var(--t);line-height:1.3;margin-bottom:4px}
.ch-unit .ch-inp{width:38px;height:32px;border:1.5px solid var(--bd);border-radius:6px;text-align:center;font-family:'Nanum Gothic',sans-serif;font-size:14pt;font-weight:700;color:var(--accent);background:var(--s);outline:none;transition:.15s;padding:0}
.ch-unit .ch-inp:focus{border-color:var(--blue);background:#fff}
.ch-unit .ch-inp.correct{background:var(--good-light);border-color:var(--good);color:var(--good)}
.ch-unit .ch-inp.wrong{background:var(--bad-light);border-color:var(--bad);color:var(--bad)}
.ch-unit .ch-inp.revealed{background:#fffbeb;border-color:#d97706;color:#d97706;font-weight:800}

.ch-kor{display:inline-flex;flex-direction:column;align-items:center;padding:4px 2px}
.ch-kor .ch-hj{font-family:'Noto Serif KR',serif;font-size:14pt;color:var(--t2);line-height:1.3;margin-bottom:4px;font-weight:600}
.ch-kor .sp{width:38px;height:32px}
.ch-space{display:inline-block;width:14px}

.write-answer{display:none;margin-top:14px;padding:14px 16px;background:var(--good-light);border:1px solid #86efac;border-radius:10px;font-size:11pt;color:var(--t);line-height:1.8;word-break:keep-all}
.write-answer.show{display:block}
.write-answer .lbl{font-size:10px;color:var(--good);font-weight:800;letter-spacing:2px;margin-right:6px}

.write-ctrl{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;justify-content:center}

/* ====== 해석 대조 모드 ====== */
.hint-bar{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:12px}
.toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:700;color:var(--t2);user-select:none;padding:6px 12px;border:1.5px solid var(--bd);border-radius:100px;background:var(--card);transition:.15s}
.toggle.on{border-color:var(--accent);color:var(--accent);background:#fef2f2}
.toggle .dot{width:10px;height:10px;border-radius:50%;background:var(--bd);transition:.15s}
.toggle.on .dot{background:var(--accent)}

.tcard{background:var(--card);border:1.5px solid var(--bd);border-radius:16px;padding:22px 22px;box-shadow:0 4px 20px rgba(0,0,0,.04);margin:14px 0}
.tcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px dashed var(--bd)}
.tcard-head .num{font-size:11px;color:var(--accent);letter-spacing:2px;font-weight:800}
.tcard-head .state{font-size:11px;font-weight:700;padding:4px 12px;border-radius:100px;background:var(--s);color:var(--t3)}
.tcard-head .state.cmp{background:var(--good-light);color:var(--good)}

.orig-box{font-family:'Noto Serif KR',serif;font-weight:800;text-align:center;letter-spacing:2px;line-height:1.9;color:var(--t);padding:8px 4px 14px;word-break:keep-all}
.orig-box.sz-xl{font-size:24pt}.orig-box.sz-l{font-size:20pt}.orig-box.sz-m{font-size:16pt}.orig-box.sz-s{font-size:13pt}.orig-box.sz-xs{font-size:11.5pt}

.hint-box{display:none;text-align:center;font-size:12pt;line-height:1.8;padding:10px 12px;border-radius:10px;margin-bottom:12px;word-break:keep-all}
.hint-box.show{display:block}
.hint-box.eum{background:#fef2f2;color:var(--accent);font-weight:700;letter-spacing:1px}
.hint-box.trans{background:var(--blue-light);color:var(--blue)}
.hint-box .lbl{display:block;font-size:9px;font-weight:800;letter-spacing:2px;opacity:.7;margin-bottom:2px}

.my-area{width:100%;min-height:84px;border:1.5px solid var(--bd);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:12pt;line-height:1.8;color:var(--t);background:var(--s);outline:none;resize:vertical;transition:.15s}
.my-area:focus{border-color:var(--blue);background:#fff}
.my-label{font-size:10px;color:var(--t3);font-weight:800;letter-spacing:2px;margin-bottom:5px}

.compare{display:none;margin-top:14px}
.compare.show{display:block}
.cmp-grid{display:grid;grid-template-columns:1fr;gap:8px}
.cmp-box{border-radius:10px;padding:12px 14px;font-size:11.5pt;line-height:1.8;word-break:keep-all}
.cmp-box .lbl{display:block;font-size:9px;font-weight:800;letter-spacing:2px;margin-bottom:3px}
.cmp-mine{background:#fffbeb;border:1px solid #fcd34d;color:#78350f}
.cmp-mine .lbl{color:#b45309}
.cmp-ans{background:var(--good-light);border:1px solid #86efac;color:var(--t)}
.cmp-ans .lbl{color:var(--good)}
.cmp-sub{background:var(--blue-light);border:1px solid #bfdbfe;color:var(--t)}
.cmp-sub .lbl{color:var(--blue)}
.cmp-empty{color:var(--t3);font-style:italic;font-size:10.5pt}
.diff-ok{color:var(--good)}
.diff-no{color:var(--bad);background:var(--bad-light);border-radius:3px;padding:0 1px}
.jump-btn.cmpd::after{content:'✓';position:absolute;top:-3px;right:-3px;background:var(--good);color:#fff;width:13px;height:13px;border-radius:50%;font-size:9px;line-height:13px}

/* 네비 */
.nav-btns{display:grid;grid-template-columns:1fr 2fr 1fr;gap:8px;margin:16px 0}
.nav-btn{padding:14px;background:var(--card);border:1.5px solid var(--bd);border-radius:10px;font-size:16px;cursor:pointer;font-weight:700;color:var(--t2);transition:.15s}
.nav-btn:hover:not(:disabled){background:var(--s);border-color:var(--t2)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}

/* 문장 리스트 */
.jump-list{display:flex;gap:4px;flex-wrap:wrap;padding:10px;background:var(--s);border-radius:10px;margin-top:10px}
.jump-btn{width:32px;height:32px;border:1px solid var(--bd);background:var(--card);border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700;color:var(--t2);transition:.1s;position:relative}
.jump-btn:hover{border-color:var(--t);background:var(--s2)}
.jump-btn.current{background:var(--t);color:#fff;border-color:var(--t)}
.jump-btn.flipped::after{content:'✓';position:absolute;top:-3px;right:-3px;background:var(--accent);color:#fff;width:13px;height:13px;border-radius:50%;font-size:9px;line-height:13px}
.jump-btn.mastered::after{content:'★';position:absolute;top:-3px;right:-3px;background:var(--good);color:#fff;width:13px;height:13px;border-radius:50%;font-size:9px;line-height:13px}

.info-line{font-size:11px;color:var(--t3);text-align:center;margin-bottom:8px;letter-spacing:1px}
.reset-bar{margin-top:20px;padding:10px;background:#fef3c7;border-radius:8px;text-align:center;font-size:11px;color:#78350f}
.reset-bar button{background:none;border:1px solid #d97706;color:#d97706;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700;margin-left:8px}
.kb-hint{text-align:center;font-size:10px;color:var(--t3);margin-top:8px;letter-spacing:1px}

.hidden{display:none !important}

@media(max-width:640px){
  .hero h1{font-size:22px}
  .flash-face{padding:18px 16px}
  .front-hj.sz-xl{font-size:24pt}
  .front-hj.sz-l{font-size:20pt}
  .front-hj.sz-m{font-size:16pt}
  .front-hj.sz-s{font-size:13pt}
  .front-hj.sz-xs{font-size:11pt}
  .back-orig{font-size:12pt}
  .back-eum{font-size:11pt}
  .back-trans{font-size:10pt}
  .jump-btn{width:28px;height:28px;font-size:10px}
  .ch-unit{min-width:32px;padding:3px 2px}
  .ch-unit .ch-hj{font-size:18pt}
  .ch-unit .ch-inp{width:32px;height:28px;font-size:12pt}
  .ch-kor .ch-hj{font-size:12pt}
  .ch-kor .sp{width:32px;height:28px}
  .write-card{padding:16px 12px}
  .orig-box.sz-xl{font-size:19pt}.orig-box.sz-l{font-size:16pt}.orig-box.sz-m{font-size:13.5pt}.orig-box.sz-s{font-size:11.5pt}.orig-box.sz-xs{font-size:10.5pt}
  .tcard{padding:16px 14px}
}
</style>
</head>
<body>

<div class="wrap">

<div class="hero">
  <h1>한의학한문 원문 2.0 벼락치기</h1>
  <div class="sub">플래시카드 · 음 쓰기 · 해석 대조</div>
</div>

<div class="cat-tabs" id="catTabs"></div>

<!-- 모드 전환 -->
<div class="mode-bar">
  <button class="mode-btn on" id="mFlash" onclick="setMode('flash')">📇 플래시카드</button>
  <button class="mode-btn" id="mWrite" onclick="setMode('write')">✍️ 음 쓰기</button>
  <button class="mode-btn" id="mTrans" onclick="setMode('trans')">📖 해석 대조</button>
</div>

<!-- 힌트 토글 (해석 대조 모드 전용) -->
<div class="hint-bar hidden" id="hintBar">
  <span class="toggle" id="hintToggle" onclick="toggleHint()"><span class="dot"></span><span id="hintLabel">음 표시</span></span>
</div>

<!-- 공용 컨트롤 -->
<div class="ctrl-bar">
  <button class="btn" onclick="prevCard()" id="btnPrev">◀ 이전</button>
  <div class="progress" id="progress">0 / 0</div>
  <button class="btn primary" onclick="nextCard()" id="btnNext">다음 ▶</button>
</div>

<!-- ========== 플래시카드 뷰 ========== -->
<div class="flash-wrap" id="flashView">
  <div class="flash" id="flashCard" onclick="flipCard()">
    <div class="flash-inner">
      <div class="flash-face front">
        <div class="front-hj" id="frontHJ">—</div>
        <div class="front-meta" id="frontMeta"></div>
        <div class="front-hint">터치 → 음·해석 보기</div>
      </div>
      <div class="flash-face back">
        <div class="back-label">원문</div>
        <div class="back-orig" id="backOrig">—</div>
        <div class="back-label" style="color:var(--accent)">음 (音)</div>
        <div class="back-eum" id="backEum">—</div>
        <div style="width:100%">
          <div class="back-trans-label">해석</div>
          <div class="back-trans" id="backTrans">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ========== 음 쓰기 연습 뷰 ========== -->
<div id="writeView" class="hidden">
  <div class="write-card">
    <div class="write-head">
      <div class="num" id="writeNum">—</div>
      <div class="score" id="writeScore">0 / 0</div>
    </div>
    <div class="write-body" id="writeBody"></div>
    <div class="write-answer" id="writeAnswer">
      <div><span class="lbl">음</span><span id="writeAnsEum"></span></div>
      <div style="margin-top:6px"><span class="lbl" style="color:var(--blue)">해석</span><span id="writeAnsTrans"></span></div>
    </div>
    <div class="write-ctrl">
      <button class="btn" onclick="checkWrite()">✓ 채점</button>
      <button class="btn" onclick="revealWrite()">💡 정답 보기</button>
      <button class="btn" onclick="clearWrite()">🗑️ 지우기</button>
      <button class="btn" onclick="toggleWriteAnswer()">📜 전체 정답</button>
    </div>
  </div>
</div>

<!-- ========== 해석 대조 뷰 ========== -->
<div id="transView" class="hidden">
  <div class="tcard">
    <div class="tcard-head">
      <div class="num" id="transNum">—</div>
      <div class="state" id="transState">작성 중</div>
    </div>
    <div class="orig-box" id="transOrig">—</div>

    <div class="hint-box eum" id="hintEum"><span class="lbl">음 (音)</span><span id="hintEumText"></span></div>
    <div class="hint-box trans" id="hintTrans"><span class="lbl">해석</span><span id="hintTransText"></span></div>

    <div class="my-label" id="myLabel">내 해석</div>
    <textarea class="my-area" id="myArea" placeholder="여기에 해석을 써보세요… (Ctrl+Enter: 정답 비교)" spellcheck="false"></textarea>

    <div class="compare" id="compareBox">
      <div class="cmp-grid">
        <div class="cmp-box cmp-mine"><span class="lbl">내 답</span><span id="cmpMine" class="cmp-empty">—</span></div>
        <div class="cmp-box cmp-ans"><span class="lbl" id="cmpAnsLabel">정답 해석</span><span id="cmpAns">—</span></div>
        <div class="cmp-box cmp-sub" id="cmpSubBox"><span class="lbl" id="cmpSubLabel">음</span><span id="cmpSub">—</span></div>
      </div>
    </div>

    <div class="write-ctrl">
      <button class="btn primary" onclick="toggleCompare()" id="btnCompare">⇄ 정답 비교 (Ctrl+Enter)</button>
      <button class="btn" onclick="clearMine()">🗑️ 지우기</button>
    </div>
  </div>
</div>

<!-- 네비 -->
<div class="info-line" id="infoLine">문장 번호를 누르면 바로 이동</div><div class="jump-list" id="jumpList"></div>

<div class="kb-hint" id="kbHint">← →: 이동 &nbsp;·&nbsp; Space/Enter: 뒤집기</div>

<div class="reset-bar">
  💾 뒤집음·입력 상태는 <b>영구 저장</b>됩니다
  <button onclick="resetAll()">전체 초기화</button>
</div>

</div>

<script>
// ============ 데이터 ============

const CATS = DATA.cats;
const CARDS = DATA.cards;

// ============ 상태 ============
let currentCatId = localStorage.getItem('hm2_flash_cat') || CATS[0].id;
let currentIdx = 0;
let currentMode = localStorage.getItem('hm2_flash_mode') || 'flash';

const LS_FLIP = 'hm2_flash_flipped_v1';
const LS_WRITE = 'hm2_write_inputs_v1';
const LS_ANS = 'hm2_trans_answers_v1';   // 해석/음 대조 작성 답
const LS_CMP = 'hm2_trans_compared_v1';  // 해석/음 대조 비교 완료
// 해석 대조 모드 힌트 토글 상태
let hintOn = { trans: localStorage.getItem('hm2_hint_trans') === '1' };

function loadObj(k) { try { return JSON.parse(localStorage.getItem(k) || '{}'); } catch { return {}; } }
function saveObj(k, o) { localStorage.setItem(k, JSON.stringify(o)); }

let flipped = loadObj(LS_FLIP);
let writeInputs = loadObj(LS_WRITE);  // { "taegeuk_0": ["무","극","이","태","극"], ... }
let answers = loadObj(LS_ANS);        // { "trans_noneo_0": "내 해석...", ... }
let compared = loadObj(LS_CMP);       // { "trans_noneo_0": true, ... }
function tkey() { return `trans_${currentCatId}_${currentIdx}`; }

function cardKey(c, i) { return `${c}_${i}`; }
function loadIdx(c) { return parseInt(localStorage.getItem('hm2_flash_idx_'+c) || '0'); }
function saveIdx(c, i) { localStorage.setItem('hm2_flash_idx_'+c, i); }

// ============ 탭/모드 ============
function renderTabs() {
  const t = document.getElementById('catTabs');
  t.innerHTML = '';
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-tab' + (c.id === currentCatId ? ' on' : '');
    b.innerHTML = `<span class="hj">${c.hanja.split(' ')[0]}</span>${c.name}<span class="cnt">${CARDS[c.id].length}</span>`;
    b.onclick = () => switchCat(c.id);
    t.appendChild(b);
  });
}
function switchCat(id) {
  currentCatId = id;
  localStorage.setItem('hm2_flash_cat', id);
  currentIdx = loadIdx(id);
  renderAll();
}
function setMode(m) {
  currentMode = m;
  localStorage.setItem('hm2_flash_mode', m);
  document.getElementById('mFlash').classList.toggle('on', m==='flash');
  document.getElementById('mWrite').classList.toggle('on', m==='write');
  document.getElementById('mTrans').classList.toggle('on', m==='trans');
  document.getElementById('flashView').classList.toggle('hidden', m!=='flash');
  document.getElementById('writeView').classList.toggle('hidden', m!=='write');
  document.getElementById('transView').classList.toggle('hidden', m!=='trans');
  document.getElementById('hintBar').classList.toggle('hidden', m!=='trans');
  if (m==='flash')
    document.getElementById('kbHint').textContent = 'Enter: 뒤집기 → 다음  ·  Space: 뒤집기  ·  ← →: 이동';
  else if (m==='write')
    document.getElementById('kbHint').textContent = 'Enter: 채점·다음칸 (다 맞으면 자동 다음 문장)  ·  Shift+Enter: 정답 채우기  ·  Esc: 전체 정답  ·  Ctrl+← →: 문장 이동  ·  Ctrl+⌫: 지우기';
  else
    document.getElementById('kbHint').innerHTML = 'Ctrl+Enter: 정답 비교 펼치기/접기  ·  Esc: 힌트(음) 켜기·끄기  ·  Ctrl+← →: 문장 이동  ·  Ctrl+⌫: 지우기  ·  Enter: 줄바꿈(자유 작성)';
  renderCurrent();
}

function getCurrentCards() { return CARDS[currentCatId]; }

// 한자 길이 → 크기 클래스
function sizeClass(text) {
  const hj = (text.match(/[一-鿿]/g) || []).length;
  if (hj <= 6) return 'sz-xl';
  if (hj <= 10) return 'sz-l';
  if (hj <= 16) return 'sz-m';
  if (hj <= 24) return 'sz-s';
  return 'sz-xs';
}

// ============ 플래시카드 렌더 ============
function renderFlash() {
  const cards = getCurrentCards();
  if (!cards || !cards.length) return;
  if (currentIdx >= cards.length) currentIdx = 0;
  if (currentIdx < 0) currentIdx = cards.length - 1;
  const c = cards[currentIdx];
  const cat = CATS.find(x => x.id === currentCatId);

  const hjEl = document.getElementById('frontHJ');
  hjEl.textContent = c.orig;
  hjEl.className = 'front-hj ' + sizeClass(c.orig);
  document.getElementById('frontMeta').textContent = `${cat.name} · 문장 ${c.idx}`;
  document.getElementById('backOrig').textContent = c.orig;
  document.getElementById('backEum').textContent = c.eum;
  document.getElementById('backTrans').textContent = c.trans;

  const card = document.getElementById('flashCard');
  card.classList.toggle('flipped', !!flipped[cardKey(currentCatId, currentIdx)]);
}

function flipCard() {
  const k = cardKey(currentCatId, currentIdx);
  const card = document.getElementById('flashCard');
  card.classList.toggle('flipped');
  if (card.classList.contains('flipped')) flipped[k] = true;
  else delete flipped[k];
  saveObj(LS_FLIP, flipped);
  updateProgress();
  renderJumpList();
}

// ============ 음 쓰기 모드 ============
function getWriteKey() { return cardKey(currentCatId, currentIdx); }
function getWriteData() {
  const k = getWriteKey();
  if (!writeInputs[k]) writeInputs[k] = [];
  return writeInputs[k];
}
function saveWriteInput(i, val) {
  const inputs = getWriteData();
  inputs[i] = val;
  writeInputs[getWriteKey()] = inputs;
  saveObj(LS_WRITE, writeInputs);
}

function renderWrite() {
  const cards = getCurrentCards();
  if (!cards || !cards.length) return;
  if (currentIdx >= cards.length) currentIdx = 0;
  if (currentIdx < 0) currentIdx = cards.length - 1;
  const c = cards[currentIdx];
  const cat = CATS.find(x => x.id === currentCatId);

  document.getElementById('writeNum').textContent = `${cat.name} · 문장 ${c.idx}`;

  const body = document.getElementById('writeBody');
  body.innerHTML = '';
  const savedInputs = getWriteData();
  let hanjaIdx = 0;

  c.chars.forEach((ch, i) => {
    if (ch.t === 'hanja') {
      const unit = document.createElement('div');
      unit.className = 'ch-unit';
      unit.innerHTML = `<div class="ch-hj">${ch.c}</div>`;
      const inp = document.createElement('input');
      inp.className = 'ch-inp';
      inp.type = 'text';
      inp.maxLength = 2; // 일부 음 2자 대비 (없지만 혹시)
      inp.setAttribute('data-idx', hanjaIdx);
      inp.setAttribute('data-eums', JSON.stringify(ch.e || []));
      inp.value = savedInputs[hanjaIdx] || '';
      inp.addEventListener('input', onInputChange);
      inp.addEventListener('keydown', onInputKeydown);
      unit.appendChild(inp);
      body.appendChild(unit);
      // 초기 상태 평가
      evalInput(inp);
      hanjaIdx++;
    } else if (ch.t === 'kor') {
      const unit = document.createElement('div');
      unit.className = 'ch-kor';
      unit.innerHTML = `<div class="ch-hj">${ch.c}</div><div class="sp"></div>`;
      body.appendChild(unit);
    } else if (ch.t === 'space') {
      const sp = document.createElement('span');
      sp.className = 'ch-space';
      body.appendChild(sp);
    }
  });

  // 정답 박스는 닫힌 상태로
  document.getElementById('writeAnswer').classList.remove('show');
  document.getElementById('writeAnsEum').textContent = c.eum;
  document.getElementById('writeAnsTrans').textContent = c.trans;

  updateWriteScore();
  focusWriteInput();
}

// 첫 번째 빈(또는 미해결) 칸에 자동 포커스
function focusWriteInput() {
  const inputs = document.querySelectorAll('.ch-inp');
  if (!inputs.length) return;
  let target = [...inputs].find(i => !i.classList.contains('correct') && !i.classList.contains('revealed'));
  (target || inputs[0]).focus();
}

function allSolved() {
  const inputs = document.querySelectorAll('.ch-inp');
  if (!inputs.length) return false;
  return [...inputs].every(i => i.classList.contains('correct') || i.classList.contains('revealed'));
}

let autoAdvKey = null;
function maybeAutoAdvance() {
  if (!allSolved()) return;
  const k = getWriteKey();
  if (autoAdvKey === k) return;
  autoAdvKey = k;
  const cards = getCurrentCards();
  setTimeout(() => {
    if (currentMode === 'write' && currentIdx < cards.length - 1) nextCard();
  }, 450);
}

function evalInput(inp) {
  const val = (inp.value || '').trim();
  const eums = JSON.parse(inp.getAttribute('data-eums') || '[]');
  inp.classList.remove('correct','wrong','revealed');
  if (!val) return 'empty';
  if (eums.includes(val)) {
    inp.classList.add('correct');
    return 'correct';
  }
  inp.classList.add('wrong');
  return 'wrong';
}

function onInputChange(e) {
  const inp = e.target;
  const idx = parseInt(inp.getAttribute('data-idx'));
  saveWriteInput(idx, inp.value);
  evalInput(inp);
  updateWriteScore();
  // 정답이면 자동으로 다음 칸으로, 마지막 칸이면 자동 다음 문장
  if (inp.classList.contains('correct')) {
    const inputs = document.querySelectorAll('.ch-inp');
    const nextInp = inputs[idx + 1];
    if (nextInp) nextInp.focus();
    else maybeAutoAdvance();
  }
}

function onInputKeydown(e) {
  if (e.ctrlKey || e.metaKey || e.altKey) return; // 전역 단축키에 양보
  const inp = e.target;
  const idx = parseInt(inp.getAttribute('data-idx'));
  const inputs = document.querySelectorAll('.ch-inp');
  if (e.key === 'ArrowLeft' && inp.selectionStart === 0) {
    e.preventDefault();
    const p = inputs[idx-1]; if (p) p.focus();
  } else if (e.key === 'ArrowRight' && inp.selectionStart === inp.value.length) {
    e.preventDefault();
    const n = inputs[idx+1]; if (n) n.focus();
  } else if (e.key === 'Backspace' && !inp.value) {
    e.preventDefault();
    const p = inputs[idx-1];
    if (p) { p.focus(); p.setSelectionRange(p.value.length, p.value.length); }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (e.shiftKey) { revealWrite(); return; }  // Shift+Enter: 정답 채우기
    // Enter: 전체 채점 후 다음 미해결 칸으로, 전부 정답이면 자동 다음 문장
    checkWrite();
    if (allSolved()) { maybeAutoAdvance(); return; }
    for (let j = 1; j <= inputs.length; j++) {
      const cand = inputs[(idx + j) % inputs.length];
      if (!cand.classList.contains('correct') && !cand.classList.contains('revealed')) {
        cand.focus(); cand.select(); return;
      }
    }
  }
}

function checkWrite() {
  const inputs = document.querySelectorAll('.ch-inp');
  inputs.forEach(inp => evalInput(inp));
  updateWriteScore();
}

function revealWrite() {
  const inputs = document.querySelectorAll('.ch-inp');
  inputs.forEach((inp, i) => {
    const eums = JSON.parse(inp.getAttribute('data-eums') || '[]');
    if (eums.length) {
      inp.value = eums[0];
      inp.classList.remove('correct','wrong');
      inp.classList.add('revealed');
      saveWriteInput(parseInt(inp.getAttribute('data-idx')), inp.value);
    }
  });
  updateWriteScore();
}

function clearWrite() {
  const inputs = document.querySelectorAll('.ch-inp');
  inputs.forEach(inp => {
    inp.value = '';
    inp.classList.remove('correct','wrong','revealed');
    saveWriteInput(parseInt(inp.getAttribute('data-idx')), '');
  });
  updateWriteScore();
}

function toggleWriteAnswer() {
  document.getElementById('writeAnswer').classList.toggle('show');
}

function updateWriteScore() {
  const inputs = document.querySelectorAll('.ch-inp');
  const total = inputs.length;
  let correct = 0;
  inputs.forEach(inp => {
    if (inp.classList.contains('correct') || inp.classList.contains('revealed')) correct++;
  });
  const el = document.getElementById('writeScore');
  el.textContent = `${correct} / ${total}`;
  el.className = 'score';
  if (correct === total && total > 0) el.classList.add('perfect');
  else if (correct > total / 2) el.classList.add('good');
}

// 카드가 "마스터"됐는지 (모두 정답이면)
function isMastered(catId, idx) {
  const k = cardKey(catId, idx);
  const inputs = writeInputs[k];
  if (!inputs) return false;
  const c = CARDS[catId][idx];
  const hanjaChars = c.chars.filter(x => x.t === 'hanja');
  if (hanjaChars.length === 0) return false;
  for (let i = 0; i < hanjaChars.length; i++) {
    const user = (inputs[i] || '').trim();
    if (!user) return false;
    if (!hanjaChars[i].e.includes(user)) return false;
  }
  return true;
}

// ============ 해석 대조 모드 ============
function toggleHint() {
  hintOn.trans = !hintOn.trans;
  localStorage.setItem('hm2_hint_trans', hintOn.trans ? '1' : '0');
  applyHint();
}
function applyHint() {
  const c = getCurrentCards()[currentIdx];
  const tg = document.getElementById('hintToggle');
  const eumBox = document.getElementById('hintEum');
  tg.classList.toggle('on', hintOn.trans);
  eumBox.classList.toggle('show', hintOn.trans);
  document.getElementById('hintTrans').classList.remove('show');
  document.getElementById('hintEumText').textContent = c.eum;
  document.getElementById('hintTransText').textContent = c.trans;
}

function renderTrans() {
  const cards = getCurrentCards();
  if (!cards || !cards.length) return;
  if (currentIdx >= cards.length) currentIdx = 0;
  if (currentIdx < 0) currentIdx = cards.length - 1;
  const c = cards[currentIdx];
  const cat = CATS.find(x => x.id === currentCatId);

  document.getElementById('transNum').textContent = `${cat.name} · 문장 ${c.idx}`;
  const ob = document.getElementById('transOrig');
  ob.textContent = c.orig;
  ob.className = 'orig-box ' + sizeClass(c.orig);

  applyHint();

  const ta = document.getElementById('myArea');
  ta.value = answers[tkey()] || '';

  // 비교 박스는 접힌 상태로 시작
  document.getElementById('compareBox').classList.remove('show');
  updateTransState();
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

function updateTransState() {
  const st = document.getElementById('transState');
  if (compared[tkey()]) { st.textContent = '비교 완료'; st.classList.add('cmp'); }
  else { st.textContent = '작성 중'; st.classList.remove('cmp'); }
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleCompare() {
  const box = document.getElementById('compareBox');
  const willShow = !box.classList.contains('show');
  if (willShow) fillCompare();
  box.classList.toggle('show', willShow);
  if (willShow) {
    const mine = (document.getElementById('myArea').value || '').trim();
    if (mine) { compared[tkey()] = true; saveObj(LS_CMP, compared); updateTransState(); renderJumpList(); updateProgress(); }
  } else {
    document.getElementById('myArea').focus();
  }
}
function fillCompare() {
  const c = getCurrentCards()[currentIdx];
  const mine = (document.getElementById('myArea').value || '').trim();
  const mineEl = document.getElementById('cmpMine');
  if (mine) { mineEl.textContent = mine; mineEl.classList.remove('cmp-empty'); }
  else { mineEl.textContent = '(작성한 답 없음)'; mineEl.classList.add('cmp-empty'); }
  document.getElementById('cmpAnsLabel').textContent = '정답 해석';
  document.getElementById('cmpAns').textContent = c.trans;
  document.getElementById('cmpSubLabel').textContent = '음';
  document.getElementById('cmpSub').textContent = c.eum;
}

function clearMine() {
  delete answers[tkey()]; saveObj(LS_ANS, answers);
  delete compared[tkey()]; saveObj(LS_CMP, compared);
  const ta = document.getElementById('myArea'); ta.value = '';
  document.getElementById('compareBox').classList.remove('show');
  updateTransState(); renderJumpList(); updateProgress(); ta.focus();
}

// ============ 공통 ============
function renderCurrent() {
  if (currentMode === 'flash') renderFlash();
  else if (currentMode === 'write') renderWrite();
  else renderTrans();
  updateProgress();
  renderJumpList();
  saveIdx(currentCatId, currentIdx);
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  document.getElementById('btnNext').disabled = currentIdx === getCurrentCards().length - 1;
}

// 해석 대조 입력 저장
document.getElementById('myArea').addEventListener('input', e => {
  answers[tkey()] = e.target.value; saveObj(LS_ANS, answers);
});

function renderAll() {
  renderTabs();
  renderCurrent();
}

function updateProgress() {
  const cards = getCurrentCards();
  const cat = currentCatId;
  let count, label;
  if (currentMode === 'flash') {
    count = cards.filter((_, i) => flipped[cardKey(cat, i)]).length;
    label = '장 열람';
  } else if (currentMode === 'write') {
    count = cards.filter((_, i) => isMastered(cat, i)).length;
    label = '장 마스터';
  } else {
    count = cards.filter((_, i) => compared[`trans_${cat}_${i}`]).length;
    label = '장 비교';
  }
  document.getElementById('progress').innerHTML = 
    `<b>${currentIdx + 1}</b> / ${cards.length}<span class="done">(${count}${label})</span>`;
}

function renderJumpList() {
  const list = document.getElementById('jumpList');
  const cards = getCurrentCards();
  list.innerHTML = '';
  cards.forEach((c, i) => {
    const b = document.createElement('button');
    let cls = 'jump-btn' + (i === currentIdx ? ' current' : '');
    if (currentMode === 'flash') {
      if (flipped[cardKey(currentCatId, i)]) cls += ' flipped';
    } else if (currentMode === 'write') {
      if (isMastered(currentCatId, i)) cls += ' mastered';
    } else {
      if (compared[`trans_${currentCatId}_${i}`]) cls += ' cmpd';
    }
    b.className = cls;
    b.textContent = c.idx;
    b.onclick = () => { currentIdx = i; renderCurrent(); };
    list.appendChild(b);
  });
}

function prevCard() { if (currentIdx > 0) { currentIdx--; renderCurrent(); } }
function nextCard() {
  const cards = getCurrentCards();
  if (currentIdx < cards.length - 1) { currentIdx++; renderCurrent(); }
}

function resetAll() {
  if (!confirm('플래시카드 뒤집힘 + 음 쓰기 입력 + 해석 대조 답을 모두 초기화할까요?')) return;
  flipped = {}; writeInputs = {}; answers = {}; compared = {};
  saveObj(LS_FLIP, flipped);
  saveObj(LS_WRITE, writeInputs);
  saveObj(LS_ANS, answers);
  saveObj(LS_CMP, compared);
  renderCurrent();
}

// 키보드
document.addEventListener('keydown', e => {
  // 입력칸 안에서도 동작하는 전역 단축키
  if (e.key === 'PageUp' || ((e.ctrlKey || e.metaKey) && e.key === 'ArrowLeft')) { e.preventDefault(); prevCard(); return; }
  if (e.key === 'PageDown' || ((e.ctrlKey || e.metaKey) && e.key === 'ArrowRight')) { e.preventDefault(); nextCard(); return; }
  if (currentMode === 'write') {
    if (e.key === 'Escape') { e.preventDefault(); toggleWriteAnswer(); return; }               // Esc: 전체 정답·해설
    if ((e.ctrlKey || e.metaKey) && e.key === 'Backspace') { e.preventDefault(); clearWrite(); focusWriteInput(); return; } // Ctrl+BS: 지우기
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); revealWrite(); return; }  // Ctrl+Enter: 정답 채우기
  }
  if (currentMode === 'trans') {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); toggleCompare(); return; } // Ctrl+Enter: 비교 토글
    if (e.key === 'Escape') { e.preventDefault(); toggleHint(); return; }                                // Esc: 힌트 토글
    if ((e.ctrlKey || e.metaKey) && e.key === 'Backspace') { e.preventDefault(); clearMine(); return; }  // Ctrl+BS: 지우기
  }
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === 'ArrowRight') nextCard();
  else if (e.key === ' ' && currentMode === 'flash') { e.preventDefault(); flipCard(); }
  else if (e.key === 'Enter' && currentMode === 'flash') {
    e.preventDefault();
    // Enter: 안 뒤집혔으면 뒤집기(해설 보기), 이미 뒤집혔으면 다음 카드
    const card = document.getElementById('flashCard');
    if (card.classList.contains('flipped')) nextCard();
    else flipCard();
  }
});

// 초기 렌더
currentIdx = loadIdx(currentCatId);
setMode(currentMode);  // 이게 renderAll 역할 대신 함
renderTabs();
</script>
